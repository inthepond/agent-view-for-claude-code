<svg width="128" height="128" viewBox="0 0 128 128" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="64" y1="2" x2="64" y2="126" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#26262B"/>
      <stop offset="1" stop-color="#101012"/>
    </linearGradient>
  </defs>
  <rect x="2" y="2" width="124" height="124" rx="30" fill="url(#bg)"/>
  <rect x="2.75" y="2.75" width="122.5" height="122.5" rx="29.25" fill="none" stroke="#FFFFFF" stroke-opacity="0.07" stroke-width="1.5"/>

  <!-- connectors: parent branches to each agent -->
  <g stroke="#FFFFFF" stroke-width="5" stroke-linecap="round" opacity="0.9">
    <path d="M64 44 L40 89"/>
    <path d="M64 44 L64 91"/>
    <path d="M64 44 L88 89"/>
  </g>

  <!-- child agent nodes -->
  <g fill="#FFFFFF">
    <circle cx="40" cy="90" r="8.5"/>
    <circle cx="64" cy="92" r="8.5"/>
    <circle cx="88" cy="90" r="8.5"/>
  </g>

  <!-- parent / orchestrator node (white ring) -->
  <circle cx="64" cy="42" r="12.5" fill="#FFFFFF"/>

  <!-- glitched terracotta core: faint RGB channel split (cyan + red ghosts) -->
  <g>
    <circle cx="61.8" cy="42.3" r="5.2" fill="#23D3EE" opacity="0.45"/>
    <circle cx="66.2" cy="41.7" r="5.2" fill="#FB3B5C" opacity="0.45"/>
    <circle cx="64" cy="42" r="5.2" fill="#D97757"/>
  </g>
</svg>
